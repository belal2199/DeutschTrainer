services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/deutsch_trainer
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      AI_MODEL: ${AI_MODEL:-qwen2.5:7b}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.2}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-1000}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-60000}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      NEWS_API_URL: ${NEWS_API_URL:-https://newsapi.org/v2}
      NEWS_CACHE_TTL: ${NEWS_CACHE_TTL:-900}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "4200:80"

volumes:
  mongo_data: